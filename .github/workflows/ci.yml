name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Type-check / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "node_version=$(cat .nvmrc | tr -d 'v')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npx vitest run --coverage

      - name: Validate env vars
        run: node scripts/check-env.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-build-check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-build-check
          NEXT_PUBLIC_STRIPE_PAYMENT_LINK: https://placeholder
          NEXT_PUBLIC_STRIPE_ANNUAL_LINK: https://placeholder

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "node_version=$(cat .nvmrc | tr -d 'v')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-build-check
          NEXT_PUBLIC_STRIPE_PAYMENT_LINK: https://placeholder
          NEXT_PUBLIC_STRIPE_ANNUAL_LINK: https://placeholder

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  bug-scan:
    name: Hidden Bug Detector
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run detect_hidden_bugs.py
        run: |
          output=$(python3 scripts/detect_hidden_bugs.py --fix-hint 2>&1) || true
          echo "$output"
          # Fail only on CRITICAL findings
          if echo "$output" | grep -q "CRITICAL"; then
            echo "::error::CRITICAL issues detected by detect_hidden_bugs.py"
            exit 1
          fi

      # z157: i18n / locale drift 自動検出 (z140-z155 で 12 cycle 連続発見した
      # pattern を CI で強制チェック、手動 MCP 検証ループを停止)
      - name: Run detect_locale_drift.py
        run: python3 scripts/detect_locale_drift.py --ci

      # z255h: schema-code mismatch (supabase select で不存在列を呼んで silent fail)
      # z255g で /wiki/[lang]/[slug] が created_at 不存在で全 4,665 page 404 だった
      # 重大 bug が発覚、再発防止のため CI block。
      - name: Run detect_schema_code_mismatch.py
        run: python3 scripts/detect_schema_code_mismatch.py --ci

      # z255m/n: i18n key reference (t() の missing key + 翻訳忘れ + locale parity)
      # makeT() の fallback で literal 表示される silent bug を CI block。
      - name: Run detect_i18n_missing_keys.py
        run: python3 scripts/detect_i18n_missing_keys.py --ci

      # z255o: dead component detection (warning level)
      # refactoring で残された未 import の component を可視化。
      # KNOWN_DEAD に登録された 2 件以外の新 dead が出たら 🟡 で報告。
      - name: Run detect_dead_components.py
        run: python3 scripts/detect_dead_components.py --ci

      # z255dd: robots: { index: true } の static route が sitemap に含まれているか
      # 明示 indexable な page が sitemap 漏れていると Google が orphan として
      # 拾うが SEO 強化機会喪失。本 lint で漏れを catch。
      - name: Run detect_indexable_orphan_routes.py
        run: python3 scripts/detect_indexable_orphan_routes.py --ci

      # z255ee: public indexable static page に canonical metadata があるか
      # 欠落していると Google が tracking parameter 付き URL を canonical
      # 採用する risk + duplicate content 判定の risk。
      - name: Run detect_missing_canonical.py
        run: python3 scripts/detect_missing_canonical.py --ci

      # z255ff: bjj-app → wiki cross-product URL に .html extension があるか
      # GitHub Pages の clean URL fallback 保証なし、convention 不一致は
      # 一部 link 404 risk + UX 不一致。
      - name: Run detect_wiki_url_drift.py
        run: python3 scripts/detect_wiki_url_drift.py --ci

      # z255gg: 内部 href の route 整合性 + anchor #frag 死活
      # route renaming 後の dead link / 未存在 anchor の click → scroll 失敗
      # = silent UX bug を恒久 catch。
      - name: Run detect_internal_link_drift.py
        run: python3 scripts/detect_internal_link_drift.py --ci

      # z257: bare setTimeout(setState) leak
      # CLAUDE.md rule: 必ず変数 / ref に capture して useEffect cleanup で
      # clearTimeout すること。直接呼びはメモリリーク + unmount 後 setState 警告。
      - name: Run detect_unsafe_settimeout.py
        run: python3 scripts/detect_unsafe_settimeout.py --ci

      # z257: JSON.parse(localStorage.getItem(...)) は try/catch 必須
      # corrupted value (manual edit / browser bug) で throw → component が
      # permanent crash する hazard を恒久 catch。
      - name: Run detect_localstorage_hazards.py
        run: python3 scripts/detect_localstorage_hazards.py --ci

      # z258: optimistic UI update without rollback (= silent data divergence)
      # setX(<new>) before await supabase.update/delete() で error branch に
      # 同じ setter が無い handler を catch (data 状態 only / loading flag 除外)
      - name: Run detect_optimistic_no_rollback.py
        run: python3 scripts/detect_optimistic_no_rollback.py --ci

  smoke-test:
    name: Post-deploy Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "node_version=$(cat .nvmrc | tr -d 'v')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.node_version }}

      - name: Wait for Vercel deployment
        run: sleep 60

      - name: Run smoke tests
        run: node scripts/smoke-test.mjs --json
