name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Type-check / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "node_version=$(cat .nvmrc | tr -d 'v')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npx vitest run --coverage

      - name: Validate env vars
        run: node scripts/check-env.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-build-check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-build-check
          NEXT_PUBLIC_STRIPE_PAYMENT_LINK: https://placeholder
          NEXT_PUBLIC_STRIPE_ANNUAL_LINK: https://placeholder

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "node_version=$(cat .nvmrc | tr -d 'v')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-build-check
          NEXT_PUBLIC_STRIPE_PAYMENT_LINK: https://placeholder
          NEXT_PUBLIC_STRIPE_ANNUAL_LINK: https://placeholder

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  bug-scan:
    name: Hidden Bug Detector
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run detect_hidden_bugs.py
        run: |
          output=$(python3 scripts/detect_hidden_bugs.py --fix-hint 2>&1) || true
          echo "$output"
          # Fail only on CRITICAL findings
          if echo "$output" | grep -q "CRITICAL"; then
            echo "::error::CRITICAL issues detected by detect_hidden_bugs.py"
            exit 1
          fi

      # z157: i18n / locale drift 自動検出 (z140-z155 で 12 cycle 連続発見した
      # pattern を CI で強制チェック、手動 MCP 検証ループを停止)
      - name: Run detect_locale_drift.py
        run: python3 scripts/detect_locale_drift.py --ci

  smoke-test:
    name: Post-deploy Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "node_version=$(cat .nvmrc | tr -d 'v')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.node_version }}

      - name: Wait for Vercel deployment
        run: sleep 60

      - name: Run smoke tests
        run: node scripts/smoke-test.mjs --json
