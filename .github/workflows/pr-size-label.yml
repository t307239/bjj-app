name: PR Size Label

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  label:
    name: Label PR by size
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate diff size
        id: diff
        run: |
          ADDITIONS=$(git diff --numstat origin/${{ github.base_ref }}..HEAD -- '*.ts' '*.tsx' '*.css' '*.json' | awk '{ sum += $1 } END { print sum+0 }')
          DELETIONS=$(git diff --numstat origin/${{ github.base_ref }}..HEAD -- '*.ts' '*.tsx' '*.css' '*.json' | awk '{ sum += $2 } END { print sum+0 }')
          TOTAL=$((ADDITIONS + DELETIONS))
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "additions=$ADDITIONS" >> "$GITHUB_OUTPUT"
          echo "deletions=$DELETIONS" >> "$GITHUB_OUTPUT"
          if [ "$TOTAL" -lt 50 ]; then
            echo "label=size/XS" >> "$GITHUB_OUTPUT"
          elif [ "$TOTAL" -lt 200 ]; then
            echo "label=size/S" >> "$GITHUB_OUTPUT"
          elif [ "$TOTAL" -lt 500 ]; then
            echo "label=size/M" >> "$GITHUB_OUTPUT"
          elif [ "$TOTAL" -lt 1000 ]; then
            echo "label=size/L" >> "$GITHUB_OUTPUT"
          else
            echo "label=size/XL" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply label
        uses: actions/github-script@v7
        with:
          script: |
            const label = '${{ steps.diff.outputs.label }}';
            const sizeLabels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL'];

            // Remove existing size labels
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const l of currentLabels) {
              if (sizeLabels.includes(l.name) && l.name !== label) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: l.name,
                });
              }
            }

            // Add new label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label],
            });

            core.info(`PR size: +${{ steps.diff.outputs.additions }}/-${{ steps.diff.outputs.deletions }} = ${{ steps.diff.outputs.total }} lines → ${label}`);
