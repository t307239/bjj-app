# Dependabot — automated dependency update PRs
# Monthly cadence to minimise PR noise for solo-dev workflow.
# See https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # npm (bjj-app root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "toshiki-the-p"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    # Group minor+patch to reduce noise
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci):"
