<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道場あるある | BJJ App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif}
.wrap{width:340px}
.card{background:#FFE066;border-radius:24px;overflow:hidden;aspect-ratio:9/16;max-height:560px;position:relative;display:flex;flex-direction:column}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;transition:opacity 0.4s;pointer-events:none;padding:32px}
.slide.active{opacity:1;pointer-events:auto}
.tag{display:inline-block;background:#000;color:#FFE066;font-size:10px;font-weight:800;padding:6px 14px;border-radius:30px;letter-spacing:1.5px;align-self:flex-start;margin-bottom:8px}
.title-tier{font-size:13px;font-weight:700;color:#000;letter-spacing:1px;margin-bottom:8px;opacity:0.6}
.text-main{font-size:32px;line-height:1.25;color:#000;font-weight:900;letter-spacing:-1px;margin-top:auto;margin-bottom:auto}
.emoji{font-size:80px;text-align:center;margin:20px 0;line-height:1}
.text-second{font-size:18px;line-height:1.4;color:#000;font-weight:600;margin-top:14px;opacity:0.85}
.text-third{font-size:16px;line-height:1.4;color:#000;font-weight:500;margin-top:auto;margin-bottom:14px;font-style:italic;opacity:0.7}
.bottom-info{display:flex;align-items:center;gap:8px;margin-top:auto}
.kebab{font-size:11px;color:#000;font-weight:600;opacity:0.5;letter-spacing:0.5px}
.cta{background:#000;color:#FFE066;border:none;border-radius:30px;padding:14px 22px;font-size:14px;font-weight:800;width:100%;cursor:pointer;letter-spacing:0.5px;margin-top:auto}
.logo{position:absolute;bottom:18px;left:32px;font-size:10px;font-weight:800;color:#000;opacity:0.5;letter-spacing:2px;z-index:2}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,0.2);transition:all 0.3s;display:inline-block;margin:0 3px}
.dot.active{background:#000;width:20px;border-radius:3px}
.dots-bar{position:absolute;bottom:8px;right:32px;display:flex;justify-content:center;z-index:2}
.progress{position:absolute;top:0;left:0;height:3px;background:#000;transition:width 3.5s linear;z-index:3}
.bullet{display:flex;align-items:center;gap:8px;font-size:18px;color:#000;font-weight:600;margin-bottom:14px;line-height:1.3}
.bullet-dot{width:7px;height:7px;background:#000;border-radius:50%;flex-shrink:0;margin-top:7px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">
    <div class="progress" id="prog"></div>

    <!-- Slide 1: Setup (relatable scenario) -->
    <div class="slide active" id="s0">
      <div class="tag">道場あるある</div>
      <div class="title-tier">#001</div>
      <div class="text-main">スパー後、<br>携帯に手が<br>届かない。</div>
      <div class="emoji">😩</div>
      <div class="text-third">— 全 BJJ 練習者の共通体験</div>
    </div>

    <!-- Slide 2: 共感の連打 -->
    <div class="slide" id="s1">
      <div class="tag">そして</div>
      <div class="bullet"><div class="bullet-dot"></div><div>水分が足りなさすぎ</div></div>
      <div class="bullet"><div class="bullet-dot"></div><div>道着の重さが 2 倍に</div></div>
      <div class="bullet"><div class="bullet-dot"></div><div>家まで 30 分の<br>筋肉痛との戦い</div></div>
      <div class="bullet"><div class="bullet-dot"></div><div>翌朝、起き上がれない</div></div>
      <div class="text-third" style="margin-top:auto">— あなただけじゃない。</div>
    </div>

    <!-- Slide 3: CTA / app pitch -->
    <div class="slide" id="s2">
      <div class="tag">解決策</div>
      <div class="text-main" style="margin-top:30px">記録すれば<br>強くなれる。</div>
      <div class="text-second">スパー回数・タップ数・反省点を残す習慣で、上達速度が変わる。</div>
      <button class="cta" onclick="window.open('https://bjj-app.net','_blank')">無料で BJJ App を試す →</button>
    </div>

    <div class="logo">BJJ APP</div>
    <div class="dots-bar">
      <span class="dot active" id="d0"></span>
      <span class="dot" id="d1"></span>
      <span class="dot" id="d2"></span>
    </div>
  </div>
</div>
<script>
let cur=0,timer=null;
const slides=document.querySelectorAll('.slide');
const dots=document.querySelectorAll('.dot');
const prog=document.getElementById('prog');
function go(n){slides[cur].classList.remove('active');dots[cur].classList.remove('active');cur=((n%3)+3)%3;slides[cur].classList.add('active');dots[cur].classList.add('active');prog.style.transition='none';prog.style.width='0%';requestAnimationFrame(()=>{requestAnimationFrame(()=>{prog.style.transition='width 3.5s linear';prog.style.width='100%';});});}
function start(){clearInterval(timer);timer=setInterval(()=>go(cur+1),3500);}
document.getElementById('card').addEventListener('click',e=>{const x=e.clientX,rect=e.currentTarget.getBoundingClientRect();if(x-rect.left>rect.width/2)go(cur+1);else go(cur-1);start();});
go(0);start();
</script>
</body>
</html>
