<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名言 | BJJ App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif}
.wrap{width:340px}
.card{background:#0d0d0d;border-radius:20px;overflow:hidden;aspect-ratio:9/16;max-height:560px;position:relative;display:flex;flex-direction:column}
/* 道着の織目を模した背景パターン */
.card::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,0.018) 0px,rgba(255,255,255,0.018) 1px,transparent 1px,transparent 5px);pointer-events:none}
.card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(180,40,40,0.14),transparent 65%);pointer-events:none}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;transition:opacity 0.5s cubic-bezier(0.4,0,0.2,1);pointer-events:none;padding:40px 32px}
.slide.active{opacity:1;pointer-events:auto}
.tag{font-size:10px;font-weight:700;letter-spacing:3px;color:rgba(180,40,40,0.95);margin-bottom:auto;z-index:2}
.quote-mark{position:absolute;top:48px;left:32px;font-size:90px;color:rgba(180,40,40,0.18);font-family:Georgia,serif;line-height:1;font-weight:700;z-index:1}
.quote-text{font-size:24px;line-height:1.4;color:#fff;font-weight:700;margin-top:90px;margin-bottom:auto;z-index:2;letter-spacing:-0.3px}
.quote-text-en{font-size:18px;line-height:1.5;color:rgba(255,255,255,0.5);margin-top:14px;font-style:italic;font-weight:400;letter-spacing:0.2px}
.author{margin-top:auto;z-index:2}
.author-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.author-title{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px}
.divider{width:30px;height:2px;background:rgba(180,40,40,0.95);margin:14px 0 12px}
.logo{position:absolute;bottom:18px;right:24px;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.3);font-weight:600;z-index:2}
.cta{background:rgba(180,40,40,0.95);color:#fff;border:none;border-radius:6px;padding:11px 18px;font-size:12px;font-weight:700;width:100%;cursor:pointer;letter-spacing:0.5px;margin-top:14px}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.3s;display:inline-block;margin:0 3px}
.dot.active{background:rgba(180,40,40,0.95);width:20px;border-radius:3px}
.dots-bar{position:absolute;bottom:8px;left:0;width:100%;display:flex;justify-content:center;z-index:2}
.progress{position:absolute;top:0;left:0;height:2px;background:rgba(180,40,40,0.9);transition:width 4s linear;z-index:3}
.attribute-back{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:48px 32px;text-align:center}
.belt{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#222,#000);display:flex;align-items:center;justify-content:center;margin-bottom:24px;border:3px solid rgba(180,40,40,0.95)}
.belt-stripe{width:30px;height:6px;background:#fff;border-radius:1px}
.author-big{font-size:26px;font-weight:800;color:#fff;margin-bottom:6px;letter-spacing:-0.3px}
.author-meta{font-size:13px;color:rgba(255,255,255,0.55);line-height:1.6;margin-bottom:24px}
.author-fact{font-size:12px;color:rgba(255,255,255,0.45);font-style:italic;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">
    <div class="progress" id="prog"></div>

    <div class="slide active" id="s0">
      <div class="tag">PHILOSOPHY</div>
      <div class="quote-mark">"</div>
      <div class="quote-text">流れに身を任せろ。<br>水のように。</div>
      <div class="quote-text-en">Flow with the go.</div>
      <div class="author">
        <div class="divider"></div>
        <div class="author-name">Rickson Gracie</div>
        <div class="author-title">9TH DEGREE RED BELT</div>
      </div>
    </div>

    <div class="slide" id="s1">
      <div class="attribute-back">
        <div class="belt"><div class="belt-stripe"></div></div>
        <div class="author-big">Rickson Gracie</div>
        <div class="author-meta">グレイシー柔術 9段 紅帯<br>無敗 400戦以上の伝説</div>
        <div class="author-fact">「敗北を経験するまで自分の限界は<br>分からない」 — Rickson</div>
        <button class="cta" onclick="window.open('https://bjj-app.net','_blank')">他の名言を BJJ App で見る</button>
      </div>
    </div>

    <div class="logo">BJJ APP</div>
    <div class="dots-bar">
      <span class="dot active" id="d0"></span>
      <span class="dot" id="d1"></span>
    </div>
  </div>
</div>
<script>
let cur=0,timer=null;
const slides=document.querySelectorAll('.slide');
const dots=document.querySelectorAll('.dot');
const prog=document.getElementById('prog');
function go(n){slides[cur].classList.remove('active');dots[cur].classList.remove('active');cur=((n%2)+2)%2;slides[cur].classList.add('active');dots[cur].classList.add('active');prog.style.transition='none';prog.style.width='0%';requestAnimationFrame(()=>{requestAnimationFrame(()=>{prog.style.transition='width 4s linear';prog.style.width='100%';});});}
function start(){clearInterval(timer);timer=setInterval(()=>go(cur+1),4000);}
document.getElementById('card').addEventListener('click',e=>{const x=e.clientX,rect=e.currentTarget.getBoundingClientRect();if(x-rect.left>rect.width/2)go(cur+1);else go(cur-1);start();});
go(0);start();
</script>
</body>
</html>
