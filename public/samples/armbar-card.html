<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アームバー解説 | BJJ App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif}
.wrap{width:340px}
.card{background:#111;border-radius:16px;overflow:hidden;aspect-ratio:9/16;max-height:520px;position:relative;display:flex;flex-direction:column}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;transition:opacity 0.4s;pointer-events:none}
.slide.active{opacity:1;pointer-events:auto}
.top-bar{padding:16px 16px 0;display:flex;justify-content:space-between;align-items:center}
.tag{background:#E24B4A;color:#fff;font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:0.5px}
.step-label{color:rgba(255,255,255,0.5);font-size:11px}
.fig-area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px}
.bottom{padding:16px;background:linear-gradient(to top,rgba(0,0,0,0.9),transparent)}
.tech-name{color:#fff;font-size:20px;font-weight:600;line-height:1.2;margin-bottom:4px}
.desc{color:rgba(255,255,255,0.65);font-size:12px;line-height:1.5}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.3);transition:all 0.3s;display:inline-block;margin:0 3px}
.dot.active{background:#E24B4A;width:18px;border-radius:3px}
.progress{position:absolute;top:0;left:0;height:3px;background:#E24B4A;transition:width 3s linear}
.logo{position:absolute;top:16px;right:16px;color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:1px}
.dots-bar{position:absolute;bottom:6px;width:100%;display:flex;justify-content:center}
.cta{background:#E24B4A;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;width:100%;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">
    <div class="progress" id="prog"></div>
    <div class="slide active" id="s0">
      <div class="top-bar"><div class="tag">TECHNIQUE</div><div class="step-label">1 / 4</div></div>
      <div class="fig-area"><svg viewBox="0 0 260 200" width="260" height="200"><circle cx="130" cy="100" r="90" fill="#E24B4A" opacity="0.15"/><g fill="#fff" opacity="0.9"><circle cx="130" cy="55" r="14"/><rect x="116" y="72" width="28" height="55" rx="8"/><rect x="88" y="78" width="32" height="12" rx="6"/><rect x="140" y="78" width="32" height="12" rx="6"/><rect x="116" y="122" width="13" height="45" rx="6"/><rect x="131" y="122" width="13" height="45" rx="6"/></g><g fill="#E24B4A" opacity="0.8"><ellipse cx="130" cy="175" rx="55" ry="16"/><rect x="85" y="155" width="13" height="30" rx="6"/><rect x="162" y="155" width="13" height="30" rx="6"/><circle cx="130" cy="130" r="14"/></g><text x="130" y="196" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">クローズドガード</text></svg></div>
      <div class="bottom"><div class="tech-name">アームバー</div><div class="desc">クローズドガードから腕十字を取る基本技。上の相手の片腕をコントロールする。</div></div>
    </div>
    <div class="slide" id="s1">
      <div class="top-bar"><div class="tag">STEP 1</div><div class="step-label">2 / 4</div></div>
      <div class="fig-area"><svg viewBox="0 0 260 200" width="260" height="200"><circle cx="130" cy="100" r="90" fill="#378ADD" opacity="0.12"/><g fill="#fff" opacity="0.9"><circle cx="130" cy="50" r="14"/><rect x="116" y="67" width="28" height="50" rx="8"/><rect x="86" y="73" width="36" height="12" rx="6" transform="rotate(-20,86,73)"/><rect x="138" y="73" width="36" height="12" rx="6" transform="rotate(20,138,73)"/><rect x="116" y="112" width="13" height="45" rx="6" transform="rotate(-10,116,112)"/><rect x="131" y="112" width="13" height="45" rx="6" transform="rotate(10,131,112)"/></g><g fill="#378ADD" opacity="0.85"><ellipse cx="130" cy="170" rx="55" ry="14"/><rect x="80" y="150" width="14" height="28" rx="6"/><rect x="165" y="150" width="14" height="28" rx="6"/><circle cx="130" cy="125" r="14"/><rect x="118" y="138" width="24" height="40" rx="8"/></g><line x1="155" y1="75" x2="185" y2="55" stroke="#E24B4A" stroke-width="2.5" stroke-linecap="round"/><circle cx="188" cy="52" r="5" fill="#E24B4A"/><text x="196" y="56" fill="#E24B4A" font-size="10">片腕を掴む</text></svg></div>
      <div class="bottom"><div class="tech-name">相手の片腕を掴む</div><div class="desc">両手で相手の片腕（手首〜肘）をしっかりコントロール。姿勢を前に引き込む。</div></div>
    </div>
    <div class="slide" id="s2">
      <div class="top-bar"><div class="tag">STEP 2</div><div class="step-label">3 / 4</div></div>
      <div class="fig-area"><svg viewBox="0 0 260 200" width="260" height="200"><circle cx="130" cy="100" r="90" fill="#1D9E75" opacity="0.12"/><g fill="#fff" opacity="0.9"><circle cx="110" cy="45" r="14"/><rect x="96" y="62" width="28" height="50" rx="8" transform="rotate(-30,96,62)"/><rect x="50" y="85" width="55" height="12" rx="6"/></g><g fill="#1D9E75" opacity="0.85"><ellipse cx="155" cy="155" rx="50" ry="14"/><rect x="165" y="140" width="14" height="35" rx="6"/><circle cx="155" cy="115" r="14"/><rect x="143" y="128" width="24" height="35" rx="8"/></g><path d="M90 80 Q110 60 130 80" stroke="#E24B4A" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="128,75 135,83 122,84" fill="#E24B4A"/><text x="68" y="72" fill="#E24B4A" font-size="10">90°回転</text></svg></div>
      <div class="bottom"><div class="tech-name">身体を90°回転させる</div><div class="desc">腕を胸に引きつけながら腰を相手の腕の下に潜り込ませ、足を首側へ回す。</div></div>
    </div>
    <div class="slide" id="s3">
      <div class="top-bar"><div class="tag">FINISH</div><div class="step-label">4 / 4</div></div>
      <div class="fig-area"><svg viewBox="0 0 260 200" width="260" height="200"><circle cx="130" cy="100" r="90" fill="#E24B4A" opacity="0.15"/><g fill="#fff" opacity="0.9"><circle cx="100" cy="60" r="14"/><rect x="86" y="77" width="28" height="50" rx="8" transform="rotate(-80,86,77)"/><rect x="50" y="85" width="55" height="12" rx="6"/><path d="M88 80 L65 95 L50 88" stroke="#E24B4A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g><g fill="#555" opacity="0.7"><ellipse cx="160" cy="140" rx="55" ry="14"/><rect x="170" y="125" width="14" height="35" rx="6"/><circle cx="160" cy="100" r="14"/><rect x="148" y="113" width="24" height="35" rx="8"/></g><circle cx="130" cy="100" r="22" fill="none" stroke="#E24B4A" stroke-width="3" stroke-dasharray="8 4" opacity="0.8"/><text x="130" y="104" text-anchor="middle" fill="#E24B4A" font-size="11" font-weight="500">TAP!</text></svg></div>
      <div class="bottom"><div class="tech-name">肘関節を極める</div><div class="desc">腰を浮かせて圧力をかけ、相手の肘関節を伸ばす方向に極める。</div><a href="https://bjj-app.net" style="display:block"><button class="cta">BJJ Appで練習する</button></a></div>
    </div>
    <div class="logo">BJJ APP</div>
    <div class="dots-bar" id="dots"><span class="dot active" id="d0"></span><span class="dot" id="d1"></span><span class="dot" id="d2"></span><span class="dot" id="d3"></span></div>
  </div>
</div>
<script>
let cur=0,timer=null;
const slides=document.querySelectorAll('.slide');
const dots=document.querySelectorAll('.dot');
const prog=document.getElementById('prog');
function go(n){slides[cur].classList.remove('active');dots[cur].classList.remove('active');cur=((n%4)+4)%4;slides[cur].classList.add('active');dots[cur].classList.add('active');prog.style.transition='none';prog.style.width='0%';requestAnimationFrame(()=>{requestAnimationFrame(()=>{prog.style.transition='width 3s linear';prog.style.width='100%';});});}
function start(){clearInterval(timer);timer=setInterval(()=>go(cur+1),3000);}
document.getElementById('card').addEventListener('click',e=>{const x=e.clientX,rect=e.currentTarget.getBoundingClientRect();if(x-rect.left>rect.width/2)go(cur+1);else go(cur-1);start();});
go(0);start();
</script>
</body>
</html>
