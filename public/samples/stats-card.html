<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJJ データ | BJJ App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif}
.wrap{width:340px}
.card{background:#fff;border-radius:20px;overflow:hidden;aspect-ratio:9/16;max-height:560px;position:relative;display:flex;flex-direction:column}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;transition:opacity 0.4s;pointer-events:none;padding:32px}
.slide.active{opacity:1;pointer-events:auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.tag{font-size:10px;font-weight:700;color:#0066FF;letter-spacing:2px}
.kebab{font-size:11px;color:rgba(0,0,0,0.4);letter-spacing:1px;font-weight:600}
.q{font-size:22px;line-height:1.3;color:#000;font-weight:800;margin-bottom:auto;margin-top:8px;letter-spacing:-0.5px}
.big-num{font-size:96px;line-height:1;color:#0066FF;font-weight:900;letter-spacing:-3px;text-align:center;margin:auto 0}
.big-unit{font-size:28px;font-weight:700;color:#0066FF;letter-spacing:-1px;display:inline-block;margin-left:4px;vertical-align:top;margin-top:18px}
.big-caption{font-size:13px;color:rgba(0,0,0,0.55);text-align:center;line-height:1.6;margin-top:8px;font-weight:500}
.note{font-size:10px;color:rgba(0,0,0,0.35);font-weight:500;text-align:center;margin-top:14px;letter-spacing:0.3px}
.bar-section{margin-top:auto;margin-bottom:auto}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.bar-belt{font-size:12px;font-weight:700;color:#000;width:55px;flex-shrink:0;letter-spacing:0.5px}
.bar-track{flex:1;height:24px;background:#F0F0F0;border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;background:#0066FF;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700;letter-spacing:0.3px}
.bar-fill.white{background:#9CA3AF}
.bar-fill.blue{background:#3B82F6}
.bar-fill.purple{background:#8B5CF6}
.bar-fill.brown{background:#92400E}
.bar-fill.black{background:#000}
.cta{background:#0066FF;color:#fff;border:none;border-radius:30px;padding:14px 22px;font-size:14px;font-weight:800;width:100%;cursor:pointer;letter-spacing:0.5px;margin-top:auto}
.source-text{font-size:11px;color:rgba(0,0,0,0.35);font-weight:500;letter-spacing:0.5px;margin-top:14px}
.logo{position:absolute;bottom:18px;right:24px;font-size:10px;font-weight:800;color:#0066FF;opacity:0.7;letter-spacing:2px;z-index:2}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,0.2);transition:all 0.3s;display:inline-block;margin:0 3px}
.dot.active{background:#0066FF;width:20px;border-radius:3px}
.dots-bar{position:absolute;bottom:9px;left:32px;display:flex;z-index:2}
.progress{position:absolute;top:0;left:0;height:3px;background:#0066FF;transition:width 3.5s linear;z-index:3}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">
    <div class="progress" id="prog"></div>

    <!-- Slide 1: Question / Hook -->
    <div class="slide active" id="s0">
      <div class="header"><div class="tag">DATA · 2026</div><div class="kebab">01 / 03</div></div>
      <div class="q" style="margin-top:50px">白帯から<br>黒帯まで<br>平均何時間?</div>
      <div class="note" style="text-align:left;margin-top:auto">⬇ スワイプで答え合わせ</div>
    </div>

    <!-- Slide 2: Big number reveal -->
    <div class="slide" id="s1">
      <div class="header"><div class="tag">DATA · 2026</div><div class="kebab">02 / 03</div></div>
      <div class="big-num" style="margin-top:auto">2,000<span class="big-unit">時間</span></div>
      <div class="big-caption">マットでの実時間 (推定中央値)<br>週 3 回 × 1.5 時間 = 約 8.5 年</div>
      <div class="note">出典: IBJJF 統計 / 国際 BJJ 連盟</div>
    </div>

    <!-- Slide 3: Bar chart by belt -->
    <div class="slide" id="s2">
      <div class="header"><div class="tag">時間 / 帯</div><div class="kebab">03 / 03</div></div>
      <div class="q" style="font-size:18px;margin-top:8px">帯ごとの<br>累計時間 (中央値)</div>
      <div class="bar-section">
        <div class="bar-row"><div class="bar-belt">⚪️ 白</div><div class="bar-track"><div class="bar-fill white" style="width:18%">200h</div></div></div>
        <div class="bar-row"><div class="bar-belt">🔵 青</div><div class="bar-track"><div class="bar-fill blue" style="width:42%">600h</div></div></div>
        <div class="bar-row"><div class="bar-belt">🟣 紫</div><div class="bar-track"><div class="bar-fill purple" style="width:65%">1,100h</div></div></div>
        <div class="bar-row"><div class="bar-belt">🟤 茶</div><div class="bar-track"><div class="bar-fill brown" style="width:85%">1,600h</div></div></div>
        <div class="bar-row"><div class="bar-belt">⚫️ 黒</div><div class="bar-track"><div class="bar-fill black" style="width:100%">2,000h+</div></div></div>
      </div>
      <button class="cta" onclick="window.open('https://bjj-app.net','_blank')">あなたの累計時間を計測 →</button>
    </div>

    <div class="logo">BJJ APP</div>
    <div class="dots-bar">
      <span class="dot active" id="d0"></span>
      <span class="dot" id="d1"></span>
      <span class="dot" id="d2"></span>
    </div>
  </div>
</div>
<script>
let cur=0,timer=null;
const slides=document.querySelectorAll('.slide');
const dots=document.querySelectorAll('.dot');
const prog=document.getElementById('prog');
function go(n){slides[cur].classList.remove('active');dots[cur].classList.remove('active');cur=((n%3)+3)%3;slides[cur].classList.add('active');dots[cur].classList.add('active');prog.style.transition='none';prog.style.width='0%';requestAnimationFrame(()=>{requestAnimationFrame(()=>{prog.style.transition='width 3.5s linear';prog.style.width='100%';});});}
function start(){clearInterval(timer);timer=setInterval(()=>go(cur+1),3500);}
document.getElementById('card').addEventListener('click',e=>{const x=e.clientX,rect=e.currentTarget.getBoundingClientRect();if(x-rect.left>rect.width/2)go(cur+1);else go(cur-1);start();});
go(0);start();
</script>
</body>
</html>
